<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>how much time do you have for me</title>
  <meta name="description" content="A quiet question about time." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,200;1,200&family=Special+Elite&family=Viaoda+Libre&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* No scroll */
    }

    body {
      background: #fdfdfd;
      color: #111;
      font-family: 'Special Elite', monospace;
      /* Typewriter font */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtle paper texture */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
    }

    /* The Center Anchor */
    .anchor-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      transition: transform 2s ease, top 2s ease;
    }



    .question {
      font-family: 'Viaoda Libre', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 200;
      font-style: italic;
      color: #111;
      white-space: nowrap;
      line-height: 1.3;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .time-slider {
      -webkit-appearance: none;
      appearance: none;
      flex-grow: 1;
      height: 1px;
      background: #111;
      outline: none;
      cursor: pointer;
    }

    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #111;
      cursor: pointer;
    }

    .time-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #111;
      cursor: pointer;
      border: none;
    }

    .slider-label {
      font-family: 'Special Elite', monospace;
      font-size: 0.9rem;
      color: #666;
      white-space: nowrap;
    }

    /* The Canvas / Text area */
    .canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 2s ease;
    }

    /* Scaling mechanism */
    body[data-tier="1"] .canvas {
      transform: scale(1);
    }

    body[data-tier="2"] .canvas {
      transform: scale(0.98);
    }

    body[data-tier="3"] .canvas {
      transform: scale(0.96);
    }

    body[data-tier="4"] .canvas {
      transform: scale(0.94);
    }

    body[data-tier="5"] .canvas {
      transform: scale(0.92);
    }

    body[data-tier="6"] .canvas {
      transform: scale(0.90);
    }

    body[data-tier="7"] .canvas {
      transform: scale(0.88);
    }

    body[data-tier="8"] .canvas {
      transform: scale(0.86);
    }

    body[data-tier="9"] .canvas {
      transform: scale(0.84);
    }

    body[data-tier="10"] .canvas {
      transform: scale(0.82);
    }

    body[data-tier="11"] .canvas {
      transform: scale(0.80);
    }

    body[data-tier="12"] .canvas {
      transform: scale(0.78);
    }

    body[data-tier="13"] .canvas {
      transform: scale(0.76);
    }

    body[data-tier="14"] .canvas {
      transform: scale(0.74);
    }

    body[data-tier="15"] .canvas {
      transform: scale(0.72);
    }

    body[data-tier="16"] .canvas {
      transform: scale(0.70);
    }

    .tier-block {
      position: absolute;
      opacity: 0;
      visibility: hidden;
      line-height: 1.6;
      font-size: 1.2rem;
      color: #111;
      font-weight: normal;
      font-style: normal;
      transition: opacity 1.5s ease, transform 3s ease;
    }

    .tier-block.active {
      visibility: visible;
      opacity: 1;
    }

    .tier-block span {
      display: block;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .tier-block.active span {
      opacity: 1;
      transform: translateY(0);
    }

    /* Positions & Styles for Tiers */
    /* Tier 1: Center, below anchor */
    #tier-1 {
      top: 66%;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      text-align: center;
    }

    .cursor {
      display: inline-block !important;
      width: 2px;
      height: 1.1em;
      background-color: #111;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 4px;
      opacity: 1 !important;
      transform: none !important;
    }

    /* Tier 2: Below Tier 1 */
    #tier-2 {
      top: 78%;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      text-align: center;
    }

    /* Tier 3: Left side */
    #tier-3 {
      top: 32%;
      left: 6%;
      width: 25%;
    }

    /* Tier 4: Right side */
    #tier-4 {
      top: 32%;
      right: 6%;
      width: 25%;
      text-align: right;
    }

    /* Tier 5: Upper-left */
    #tier-5 {
      top: 15%;
      left: 6%;
      width: 25%;
    }

    /* Tier 6: Upper-right */
    #tier-6 {
      top: 15%;
      right: 6%;
      width: 25%;
      text-align: right;
    }

    /* Tier 7: Lower-left */
    #tier-7 {
      bottom: 25%;
      left: 6%;
      width: 25%;
    }

    /* Tier 8: Top-left */
    #tier-8 {
      top: 4%;
      left: 12%;
      width: 25%;
    }

    /* Tier 9: Top-right */
    #tier-9 {
      top: 4%;
      right: 12%;
      width: 25%;
      text-align: right;
    }

    /* Tier 10: Lower-right */
    #tier-10 {
      bottom: 25%;
      right: 6%;
      width: 25%;
      text-align: right;
    }

    /* Tier 11: Bottom-left */
    #tier-11 {
      bottom: 6%;
      left: 12%;
      width: 25%;
    }

    /* Tier 12: Bottom-right */
    #tier-12 {
      bottom: 6%;
      right: 12%;
      width: 25%;
      text-align: right;
    }

    /* Tier 13: Bottom center */
    #tier-13 {
      bottom: 2%;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      text-align: center;
    }

    /* Tier 14: Mid-left, offset */
    #tier-14 {
      top: 65%;
      left: 14%;
      width: 25%;
    }

    /* Tier 15: Mid-right, offset */
    #tier-15 {
      top: 65%;
      right: 14%;
      width: 25%;
      text-align: right;
    }

    /* Tier 16: Top center, wide */
    #tier-16 {
      top: 2%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 60%;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body data-tier="0">
  <div class="anchor-container">
    <p class="question">How much time do you have for me?</p>
    <div class="input-row">
      <span class="slider-label">1 minute</span>
      <input class="time-slider" id="timeSlider" type="range" min="0" max="16" value="0" />
      <span class="slider-label">a lifetime</span>
    </div>
  </div>

  <div class="canvas">
    <div class="tier-block" id="tier-1"></div>
    <div class="tier-block" id="tier-2"></div>
    <div class="tier-block" id="tier-3"></div>
    <div class="tier-block" id="tier-4"></div>
    <div class="tier-block" id="tier-5"></div>
    <div class="tier-block" id="tier-6"></div>
    <div class="tier-block" id="tier-7"></div>
    <div class="tier-block" id="tier-8"></div>
    <div class="tier-block" id="tier-9"></div>
    <div class="tier-block" id="tier-10"></div>
    <div class="tier-block" id="tier-11"></div>
    <div class="tier-block" id="tier-12"></div>
    <div class="tier-block" id="tier-13"></div>
    <div class="tier-block" id="tier-14"></div>
    <div class="tier-block" id="tier-15"></div>
    <div class="tier-block" id="tier-16"></div>
  </div>

  <script>
    const slider = document.getElementById('timeSlider');

    const tiersData = {
      1: ["Hi.", "My name is Quinxie.", "Nice to meet you.  |"],
      2: ["I'm 22.", "I study Computer Science and Graphic Design", "at a small college in Illinois.", "I'm not from here."],
      3: ["I still don't know how to use Fahrenheit."],
      4: ["I use the random decision maker to make decisions for me every day."],
      5: ["I'm an ambidextrous."],
      6: ["The first time I tried skateboarding, I was skating straight to a lake."],
      7: ["I love doing Hackathons and I won 9 of them."],
      8: ["I drew before I knew how to write.", "My dad had an old desktop — I played the minesweeper on it for hours.", "Art and technology have always been my two hands.", "I just spent a long time pretending I only had one."],
      9: ["My most recognized work is a business card.", "Not a regular one - an AR business card I made for a career fair.", "You hold it up to your phone and something comes alive.", "Recruiters passed it around the room.", "It went viral."],
      10: ["Favorite things I've built:", "a long-distance couples app, a time traveling app, a 3D museum, an anti brainroot while coding app", "I make things I wish existed."],
      11: ["My first dream job is to be a police officer, and my next one is to be the president.", "I guess I have loved power since I was young :)", "I started making a vlog in high school, when I applied to a scholarship for a trip to Japan.", "It got canceled due to COVID. I was so upset, and I posted that video on YouTube.", "It got 1k views."],
      12: ["When I got lost, I flew to Italy.", "There I relearned how to sketch, how to film, how to see fabric as language.", "Filmmaking and fashion design became my new obsession.", "If I had to pick one city in the world that resembles me most —", "it would be Florence."],
      13: ["I was away from home since I was 15.", "I went to a high school for the gifted and lived in a dorm with 7 other people.", "My late-night ritual is calling my mom, who is 14,000 km away."],
      14: ["Uncommon opinion, but I don't listen to music.", "I mean, I love music, but I don't listen to it a lot.", "I have a lot of noise in my head, so most of the time I just want to keep a peace of mind."],
      15: ["My name isn't actually Quinxie.", "My name is Quyen - but I was obsessed with Pixar, and I thought it was spelled Pixie.", "So I took the \"xie\" and put it with my name.", "Disney is the reason I came to the United States —", "a story about a kid who toured a Disney studio and got to try AR and VR lit something in me that never went out."],
      16: ["I don't know what the US did to me exactly.", "It gave me an identity crisis.", "It gave me a new identity.", "It brought me back to what has always been my identity.", "I'm talking about how I see people, how I build products, how I tell stories, how I walk into a room.", "<br>", "Hi. My name is Quinxie."]
    };

    // Populate DOM for tiers
    for (let i = 1; i <= 16; i++) {
      const block = document.getElementById(`tier-${i}`);
      let html = '';
      tiersData[i].forEach((line, idx) => {
        if (line === '<br>') {
          html += '<br>';
          return;
        }
        // Appear all at once instead of staggered
        const delay = "0s";

        // Add cursor to tier 1
        if (i === 1 && idx === 2) {
          html += `<span style="transition-delay: ${delay}">${line}<div class="cursor"></div></span>`;
        } else if (i === 16 && idx === tiersData[i].length - 1) {
          html += `<span style="transition-delay: ${delay}">${line}</span>`;
        } else {
          html += `<span style="transition-delay: ${delay}">${line}</span>`;
        }
      });
      block.innerHTML = html;
    }

    function update() {
      const maxTier = parseInt(slider.value, 10);
      document.body.dataset.tier = maxTier;

      for (let i = 1; i <= 16; i++) {
        const block = document.getElementById(`tier-${i}`);
        if (i <= maxTier && maxTier > 0) {
          block.classList.add('active');
        } else {
          block.classList.remove('active');
        }
      }
    }

    slider.addEventListener('input', update);

  </script>
</body>

</html>
